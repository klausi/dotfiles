---
- name: Check if Cargo is already installed
  stat:
    path: "{{ lookup('env', 'HOME') }}/.cargo/bin/cargo"
  register: cargo_binary

- name: Download Rust Installer
  when: not cargo_binary.stat.exists
  get_url:
    url: https://sh.rustup.rs
    dest: /tmp/sh.rustup.rs
    mode: '0755'
    force: 'yes'

- name: install rust/cargo
  when: not cargo_binary.stat.exists
  shell: /tmp/sh.rustup.rs -y

- name: Install cargo binstall
  community.general.cargo:
    name: cargo-binstall

- name: Check installed cargo packages
  shell: cargo install --list
  register: cargo_install_list
  changed_when: false

- name: Install global cargo packages that get updated with Topgrade
  shell: cargo binstall {{ item }} -y
  loop:
    - cargo-update
    - git-delta
  # Only run if the package is not already installed for better performance.
  when: cargo_install_list.stdout is not search('(?m)^' ~ (item | regex_escape) ~ ' v')
